name: LootSyncs Auto Post scheduled crons

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Fetcher CLI
        run: node scripts/cron-fetch.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          HEARTBEAT_SECRET: ${{ secrets.HEARTBEAT_SECRET }}

      - name: Run Worker CLI
        run: node scripts/cron-worker.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          HEARTBEAT_SECRET: ${{ secrets.HEARTBEAT_SECRET }}

      - name: Run Heartbeat Check CLI
        run: node scripts/cron-heartbeat.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          HEARTBEAT_SECRET: ${{ secrets.HEARTBEAT_SECRET }}
